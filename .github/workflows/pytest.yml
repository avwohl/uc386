name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      # uc_core is not yet on PyPI; install it from GitHub. Remove this
      # step (and the uc_core>=... dep in pyproject will pick it up from
      # PyPI) once uc_core is published.
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install "uc_core @ git+https://github.com/avwohl/uc_core@main"
        pip install -e .
    - name: Run tests
      run: pytest tests/ -v --tb=short
